services:
  frontend:
    build:
      context: ./frontend
    container_name: ${SITE_NAME:-ultimate-dnd}-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: ${SITE_NAME:-ultimate-dnd}-backend
    restart: unless-stopped
    environment:
      - PORT=8080
      - MONGO_URL=mongodb://database:27017/ultimate-dnd
      - MONGO_DB=ultimate-dnd
    depends_on:
      - database

  database:
    image: mongo:8
    container_name: ${SITE_NAME:-ultimate-dnd}-database
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
